name: Accessibility

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  a11y:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Chrome for accessibility scans
        run: |
          CHROME="$(command -v google-chrome-stable)"
          if [ -z "$CHROME" ]; then
            echo "Error: google-chrome-stable not found on runner"
            exit 1
          fi
          echo "PUPPETEER_EXECUTABLE_PATH=$CHROME" >> "$GITHUB_ENV"
          echo "Using Chrome at: $CHROME"

      - name: Start app and run a11y checks
        run: |
          npm run dev -- --host 0.0.0.0 --port 5173 &
          echo "Waiting for Vite at http://localhost:5173/ (up to 60s)…"
          ready=0
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null --connect-timeout 2 "http://localhost:5173" 2>/dev/null; then
              ready=1
              echo "Dev server responded (check $i/60)."
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "Error: dev server did not become reachable at http://localhost:5173/ within 60s."
            curl -v http://localhost:5173/ || true
            exit 1
          fi
          npm run a11y:matrix
